{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gabriel.fullname" . }}
  labels:
    {{- include "gabriel.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "gabriel.databaseUrl" . | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.twilioAccountSid }}
  TWILIO_ACCOUNT_SID: {{ .Values.secrets.twilioAccountSid | quote }}
  {{- end }}
  {{- if .Values.secrets.twilioAuthToken }}
  TWILIO_AUTH_TOKEN: {{ .Values.secrets.twilioAuthToken | quote }}
  {{- end }}
  {{- if .Values.secrets.twilioPhoneNumber }}
  TWILIO_PHONE_NUMBER: {{ .Values.secrets.twilioPhoneNumber | quote }}
  {{- end }}
  {{- if .Values.secrets.elevenLabsApiKey }}
  ELEVENLABS_API_KEY: {{ .Values.secrets.elevenLabsApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.webhookSecret }}
  WEBHOOK_SECRET: {{ .Values.secrets.webhookSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.whatsappServiceApiKey }}
  WHATSAPP_SERVICE_API_KEY: {{ .Values.secrets.whatsappServiceApiKey | quote }}
  {{- end }}
{{- end }}
