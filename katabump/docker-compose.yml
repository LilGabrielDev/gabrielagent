services:
  katabump-whatsapp:
    build: .
    container_name: katabump-whatsapp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      KATABUMP_AUTH_DIR: /data/wwebjs_auth
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    volumes:
      - katabump-whatsapp-data:/data

volumes:
  katabump-whatsapp-data:
