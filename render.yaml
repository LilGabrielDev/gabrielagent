services:
  - type: web
    name: gabrielagent
    runtime: docker
    rootDir: whatsapp-service
    plan: starter
    autoDeploy: true
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    disk:
      name: whatsapp-sessions
      mountPath: /app/sessions
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: HOST
        value: 0.0.0.0
      - key: SESSION_STORE
        value: file
      - key: SESSION_PATH
        value: /app/sessions
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        value: https://gabrielagent.vercel.app
      - key: BACKEND_URL
        value: https://gabrielagent.onrender.com
      - key: AUTO_UPDATE_ENABLED
        value: false
      - key: AUTO_UPDATE_RESTART
        value: false
